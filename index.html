<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Cinema Roulette</title>
<link rel="manifest" href="manifest.json">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: #080808; color: #ccc; font-family: Georgia, serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 16px 80px; }
.wrap { width: 100%; max-width: 660px; }
h1 { text-align: center; font-size: clamp(1.8rem,8vw,3rem); font-weight: 400; color: #e8dcc8; letter-spacing: 0.08em; line-height: 1.1; margin-bottom: 6px; }
h1 span { color: #f5c518; font-style: italic; }
.subtitle { text-align: center; font-family: monospace; color: #333; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 14px; }
.rule { width: 60px; height: 1px; background: #f5c518; margin: 0 auto 40px; }
.strip-wrap { background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 4px; padding: 20px 0; margin-bottom: 28px; position: relative; overflow: hidden; }
.strip { display: flex; gap: 6px; justify-content: center; align-items: center; padding: 0 12px; overflow: hidden; }
.frame { width: 90px; height: 80px; border: 2px solid #555; background: #111; border-radius: 2px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; flex-shrink: 0; transition: border-color 0.1s; }
.frame.active { border-color: #f5c518; background: rgba(245,197,24,0.08); }
.frame.dim { border-color: #222; background: #0a0a0a; }
.holes { position: absolute; top: 0; bottom: 0; display: flex; flex-direction: column; justify-content: space-evenly; }
.holes.l { left: 3px; } .holes.r { right: 3px; }
.hole { width: 5px; height: 8px; background: #000; border: 1px solid #333; border-radius: 1px; }
.frame-label { font-family: monospace; font-size: 9px; text-align: center; line-height: 1.3; color: #666; max-width: 70px; word-break: break-word; }
.frame.active .frame-label { color: #f5c518; }
.frame.dim .frame-label { color: #1e1e1e; }
.scan-line { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); height: 84px; border: 1px solid rgba(245,197,24,0.15); pointer-events: none; }
.shutter { position: absolute; inset: 0; background: #000; opacity: 0; pointer-events: none; transition: opacity 0.4s; z-index: 10; }
.shutter.on { opacity: 1; transition: none; }
.result { text-align: center; min-height: 64px; margin-bottom: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.result-label { font-family: monospace; color: #555; font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 8px; }
.result-title { color: #f5c518; font-size: clamp(1.1rem,5vw,1.9rem); font-style: italic; padding: 0 12px; }
.result-empty { font-family: monospace; color: #2a2a2a; font-size: 12px; letter-spacing: 0.2em; }
.skip-row { display: flex; align-items: center; justify-content: center; gap: 14px; min-height: 36px; margin-bottom: 24px; flex-wrap: wrap; }
.btn-skip { background: none; border: 1px solid #2a2a2a; color: #2a2a2a; font-family: monospace; font-size: 10px; letter-spacing: 0.2em; padding: 8px 16px; cursor: pointer; border-radius: 2px; }
.btn-skip:active { border-color: #c0392b; color: #c0392b; }
.btn-restore-all { background: none; border: none; font-family: monospace; font-size: 9px; color: #2a2a2a; letter-spacing: 0.2em; cursor: pointer; text-decoration: underline; }
.spin-wrap { display: flex; justify-content: center; margin-bottom: 44px; }
#spinBtn { background: none; border: 2px solid #f5c518; color: #f5c518; font-family: monospace; font-size: 13px; letter-spacing: 0.25em; text-transform: uppercase; padding: 16px 40px; cursor: pointer; border-radius: 2px; transition: background 0.2s; width: 100%; max-width: 320px; }
#spinBtn:active { background: rgba(245,197,24,0.08); }
#spinBtn:disabled { border-color: #222; color: #333; cursor: not-allowed; background: none; }
.divider { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.divider-line { flex: 1; height: 1px; background: #1a1a1a; }
.divider-text { font-family: monospace; color: #2a2a2a; font-size: 10px; letter-spacing: 0.3em; }
.section-label { font-family: monospace; color: #444; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 7px; }
.add-one { display: flex; gap: 8px; margin-bottom: 16px; }
.add-one input { flex: 1; background: #0d0d0d; border: 1px solid #222; border-radius: 2px; color: #ccc; font-family: monospace; font-size: 16px; padding: 12px 14px; outline: none; }
.add-one input:focus { border-color: #f5c518; }
.btn-add { background: none; border: 1px solid #333; color: #777; font-family: monospace; font-size: 11px; letter-spacing: 0.15em; padding: 0 16px; cursor: pointer; border-radius: 2px; min-width: 60px; }
.btn-add:active { border-color: #f5c518; color: #f5c518; }
.bulk-section { margin-bottom: 24px; }
.bulk-section textarea { width: 100%; background: #0d0d0d; border: 1px solid #222; border-radius: 2px; color: #ccc; font-family: monospace; font-size: 14px; padding: 12px 14px; outline: none; resize: vertical; line-height: 1.8; }
.bulk-section textarea:focus { border-color: #f5c518; }
.bulk-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 7px; }
.slots-left { font-family: monospace; color: #333; font-size: 10px; letter-spacing: 0.1em; }
.btn-bulk-add { background: none; border: 1px solid #333; color: #777; font-family: monospace; font-size: 10px; letter-spacing: 0.2em; padding: 10px 20px; cursor: pointer; border-radius: 2px; }
.btn-bulk-add:active { border-color: #f5c518; color: #f5c518; }
.list-header { background: #0d0d0d; padding: 13px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; border: 1px solid #141414; border-radius: 2px; user-select: none; }
.list-header.open { border-radius: 2px 2px 0 0; }
.list-count { font-family: monospace; color: #555; font-size: 10px; letter-spacing: 0.3em; }
.btn-clear { font-family: monospace; color: #2a2a2a; font-size: 9px; letter-spacing: 0.2em; cursor: pointer; text-decoration: underline; background: none; border: none; margin-right: 12px; padding: 4px; }
.chevron { font-family: monospace; color: #333; font-size: 12px; }
.list-body { border: 1px solid #141414; border-top: none; border-radius: 0 0 2px 2px; }
.search-wrap { padding: 8px 16px; border-bottom: 1px solid #111; background: #0a0a0a; display: none; }
.search-wrap input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #1e1e1e; color: #777; font-family: monospace; font-size: 14px; padding: 6px 0; outline: none; }
.film-list { max-height: 400px; overflow-y: auto; background: #090909; -webkit-overflow-scrolling: touch; }
.film-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #0f0f0f; border-left: 2px solid transparent; }
.film-item.picked { background: rgba(245,197,24,0.04); border-left-color: #f5c518; }
.film-item.skipped { opacity: 0.45; }
.film-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.film-num { font-family: monospace; color: #2a2a2a; font-size: 9px; min-width: 22px; flex-shrink: 0; }
.film-name { color: #777; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.film-item.picked .film-name { color: #f5c518; font-style: italic; }
.film-item.skipped .film-name { text-decoration: line-through; color: #2a2a2a; }
.hidden-badge { font-family: monospace; font-size: 9px; color: #c0392b; margin-left: 8px; opacity: 0.5; flex-shrink: 0; }
.film-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; margin-left: 8px; }
.btn-restore { background: none; border: none; font-family: monospace; font-size: 9px; color: #333; cursor: pointer; text-decoration: underline; padding: 4px; }
.btn-remove { background: none; border: none; color: #222; cursor: pointer; font-size: 18px; padding: 4px 6px; line-height: 1; }
.btn-remove:active { color: #c0392b; }
.empty-msg { text-align: center; color: #2a2a2a; font-family: monospace; font-size: 12px; letter-spacing: 0.2em; padding: 28px 0; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #111; border: 1px solid #f5c518; color: #f5c518; font-family: monospace; font-size: 11px; letter-spacing: 0.2em; padding: 10px 20px; border-radius: 2px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
.toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <p class="subtitle">Now Projecting</p>
  <h1>CINEMA<br><span>Roulette</span></h1>
  <div class="rule"></div>

  <div class="strip-wrap">
    <div class="shutter" id="shutter"></div>
    <div class="scan-line"></div>
    <div class="strip" id="strip"></div>
  </div>

  <div class="result" id="result"><div class="result-empty">— roll the reel —</div></div>

  <div class="skip-row" id="skipRow" style="visibility:hidden">
    <button class="btn-skip" onclick="skipPicked()">&#x2715; Never Show This Again</button>
    <button class="btn-restore-all" id="restoreAllBtn" onclick="restoreAll()" style="display:none">Restore all hidden</button>
  </div>

  <div class="spin-wrap">
    <button id="spinBtn" onclick="spin()">Roll the Reel</button>
  </div>

  <div class="divider"><div class="divider-line"></div><span class="divider-text">PROGRAMME</span><div class="divider-line"></div></div>

  <div class="section-label">Add One Title</div>
  <div class="add-one">
    <input type="text" id="singleInput" placeholder="Type a title…" onkeydown="if(event.key==='Enter')addSingle()">
    <button class="btn-add" onclick="addSingle()">+ Add</button>
  </div>

  <div class="bulk-section">
    <div class="section-label">Bulk Paste — one per line or comma-separated</div>
    <textarea id="bulkInput" rows="6" placeholder="The Godfather&#10;Blade Runner&#10;Akira&#10;..."></textarea>
    <div class="bulk-footer">
      <span class="slots-left" id="slotsLeft">100 slots remaining</span>
      <button class="btn-bulk-add" onclick="addBulk()">Add to List</button>
    </div>
  </div>

  <div class="list-header open" id="listHeader" onclick="toggleList()">
    <div style="display:flex;align-items:center">
      <span class="list-count" id="listCount">0 / 100 TITLES</span>
    </div>
    <div style="display:flex;align-items:center">
      <button class="btn-clear" onclick="event.stopPropagation();clearAll()">CLEAR ALL</button>
      <span class="chevron" id="chevron">▲</span>
    </div>
  </div>
  <div class="list-body" id="listBody">
    <div class="search-wrap" id="searchWrap">
      <input type="text" id="searchInput" placeholder="Search…" oninput="renderList()">
    </div>
    <div class="film-list" id="filmList"><div class="empty-msg">No films yet</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MAX = 100, FRAMES = 7;
const DEFAULT = ["Mulholland Drive","In the Mood for Love","Stalker","Eyes Wide Shut","The Shining"];
const LS_F = 'cr_films', LS_S = 'cr_skipped';

let films = [], skipped = new Set(), picked = null, spinning = false, spinIdx = null, listOpen = true;

function load() {
  try {
    const f = localStorage.getItem(LS_F);
    const s = localStorage.getItem(LS_S);
    films = f ? JSON.parse(f) : [...DEFAULT];
    skipped = new Set(s ? JSON.parse(s) : []);
  } catch(e) { films = [...DEFAULT]; }
}

function save() {
  try {
    localStorage.setItem(LS_F, JSON.stringify(films));
    localStorage.setItem(LS_S, JSON.stringify([...skipped]));
  } catch(e) {}
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2000);
}

function addSingle() {
  const inp = document.getElementById('singleInput');
  const t = inp.value.trim();
  if (!t || films.includes(t) || films.length >= MAX) return;
  films.push(t); inp.value = '';
  save(); update(); toast('Added');
}

function addBulk() {
  const ta = document.getElementById('bulkInput');
  const lines = ta.value.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
  if (!lines.length) return;
  const ex = new Set(films);
  let added = 0;
  lines.forEach(l => { if (!ex.has(l) && films.length < MAX) { films.push(l); ex.add(l); added++; } });
  ta.value = '';
  save(); update(); toast(`Added ${added} title${added !== 1 ? 's' : ''}`);
}

function removeFilm(t) {
  films = films.filter(f => f !== t);
  skipped.delete(t);
  if (picked === t) picked = null;
  save(); update();
}

function skipPicked() {
  if (!picked) return;
  skipped.add(picked); picked = null;
  save(); update(); toast('Hidden from future spins');
}

function unskip(t) { skipped.delete(t); save(); update(); }
function restoreAll() { skipped.clear(); save(); update(); toast('All restored'); }

function clearAll() {
  if (!confirm('Clear all films?')) return;
  films = []; skipped.clear(); picked = null;
  save(); update();
}

function toggleList() {
  listOpen = !listOpen;
  document.getElementById('listBody').style.display = listOpen ? '' : 'none';
  document.getElementById('listHeader').className = 'list-header' + (listOpen ? ' open' : '');
  document.getElementById('chevron').textContent = listOpen ? '▲' : '▼';
}

function spin() {
  const pool = films.filter(f => !skipped.has(f));
  if (!pool.length || spinning) return;
  picked = null; spinning = true;
  document.getElementById('spinBtn').disabled = true;
  document.getElementById('skipRow').style.visibility = 'hidden';
  let speed = 40, ticks = 0;
  const total = 30 + Math.floor(Math.random() * 20);
  function tick() {
    spinIdx = Math.floor(Math.random() * pool.length);
    renderStrip(pool); ticks++;
    if (ticks < total) {
      speed = ticks < total * 0.6 ? Math.min(speed + 2, 80) : speed + 8;
      setTimeout(tick, speed);
    } else {
      const fi = Math.floor(Math.random() * pool.length);
      spinIdx = fi; renderStrip(pool); spinning = false;
      const sh = document.getElementById('shutter');
      sh.classList.add('on');
      setTimeout(() => {
        sh.classList.remove('on');
        picked = pool[fi]; spinIdx = null;
        document.getElementById('spinBtn').disabled = false;
        update();
      }, 400);
    }
  }
  tick();
}

function renderStrip(pool) {
  pool = pool || films.filter(f => !skipped.has(f));
  if (!pool.length) pool = ['—'];
  const strip = document.getElementById('strip');
  const center = Math.floor(FRAMES / 2);
  const aIdx = spinIdx !== null ? spinIdx : (picked ? pool.indexOf(picked) : null);
  let html = '';
  for (let i = 0; i < FRAMES; i++) {
    let title, cls = '';
    if (aIdx === null) { title = pool[((i % pool.length) + pool.length) % pool.length]; }
    else {
      const idx = ((aIdx + (i - center)) % pool.length + pool.length) % pool.length;
      title = pool[idx];
      if (i === center) cls = 'active';
      else if (Math.abs(i - center) > 2) cls = 'dim';
    }
    html += `<div class="frame ${cls}"><div class="holes l"><div class="hole"></div><div class="hole"></div><div class="hole"></div></div><div class="holes r"><div class="hole"></div><div class="hole"></div><div class="hole"></div></div><span class="frame-label">${title}</span></div>`;
  }
  strip.innerHTML = html;
}

function renderList() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  const visible = films.filter(f => f.toLowerCase().includes(q));
  const list = document.getElementById('filmList');
  if (!films.length) { list.innerHTML = '<div class="empty-msg">No films yet</div>'; return; }
  if (!visible.length) { list.innerHTML = '<div class="empty-msg">No matches</div>'; return; }
  list.innerHTML = visible.map(f => {
    const ip = f === picked, sk = skipped.has(f);
    const n = String(films.indexOf(f) + 1).padStart(2, '0');
    const safe = f.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return `<div class="film-item${ip?' picked':''}${sk?' skipped':''}">
      <div class="film-left"><span class="film-num">${n}</span><span class="film-name">${f}</span>${sk?'<span class="hidden-badge">hidden</span>':''}</div>
      <div class="film-actions">${sk?`<button class="btn-restore" onclick="unskip('${safe}')">restore</button>`:''}<button class="btn-remove" onclick="removeFilm('${safe}')">&#215;</button></div>
    </div>`;
  }).join('');
}

function update() {
  const pool = films.filter(f => !skipped.has(f));
  renderStrip(pool); renderList();
  document.getElementById('listCount').textContent = `${films.length} / ${MAX} TITLES`;
  document.getElementById('slotsLeft').textContent = `${MAX - films.length} slots remaining`;
  document.getElementById('searchWrap').style.display = films.length > 8 ? '' : 'none';
  const res = document.getElementById('result');
  res.innerHTML = picked
    ? `<div class="result-label">Tonight's Feature</div><div class="result-title">${picked}</div>`
    : '<div class="result-empty">— roll the reel —</div>';
  document.getElementById('skipRow').style.visibility = picked ? 'visible' : 'hidden';
  document.getElementById('restoreAllBtn').style.display = skipped.size > 0 ? '' : 'none';
  document.getElementById('spinBtn').disabled = pool.length === 0;
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
load(); update();
</script>
</body>
</html>
